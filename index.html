<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>Bloom & Bliss</h1>
        <p>Fresh Flowers for Every Moment</p>

    </header>
    <section class="shop">
        <div class="card">
            <img src="image.png" alt="Rose">
            <h3>Red Roses</h3>
            <p class="price">₹299</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="whiteLily.jpg" alt="Lily">
            <h3>White Lily</h3>
            <p class="price">₹349</p>
            <a href="#" class="btn">Buy Now</a>

        </div>
        <div class="card">
            <img src="tulip.jpg" alt="Tulip">
            <h3>Pink Tulips</h3>
            <p class="price">₹399</p>
            <a href="#" class="btn">Buy Now</a>
        </div>
    </section>

    <footer>
        <p>©️2026 Bloom & Bliss Flower Shop</p>
    </footer>
</body>
</html>
